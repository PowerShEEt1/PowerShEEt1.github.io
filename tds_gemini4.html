<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpSheet | Live Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This wrapper ensures the embed looks like a clean app window */
        .sheet-window {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-12">

    <div class="max-w-5xl mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Live Upwork Opportunity Feed</h1>
            <p class="text-slate-500 font-medium">Direct View-Only Access (Auto-updates)</p>
        </div>

        <div class="sheet-window bg-white">
            <iframe 
                src="https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID_HERE/preview?rm=minimal&chrome=false&gid=0">
            </iframe>
        </div>

        <div class="mt-4 flex items-center gap-4 text-sm text-slate-400">
            <span class="flex items-center gap-1">
                <i class="fas fa-info-circle"></i> Updates instantly when data enters the sheet.
            </span>
        </div>
    </div>

</body>
</html>
