<section class="max-w-5xl mx-auto px-8 py-20">
        <div class="bg-slate-900 rounded-3xl p-12 text-center text-white relative overflow-hidden">
            <h2 class="text-3xl md:text-4xl font-bold mb-6">Ready to win more contracts?</h2>
            <p class="text-slate-400 mb-8 max-w-lg mx-auto">
                Join our community to get instant updates and early access via our Google Group.
            </p>
            
            <form action="https://groups.google.com/group/tdsreader/subscribe" method="GET" class="flex flex-col md:flex-row gap-4 max-w-md mx-auto">
                <input 
                    type="email" 
                    name="email" 
                    required 
                    placeholder="your-email@example.com" 
                    class="flex-1 px-6 py-4 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                >
                <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-xl font-bold transition">
                    Subscribe
                </button>
            </form>
            
            <p class="mt-4 text-xs text-slate-500">
                Or send a blank email to: <a href="mailto:tdsreader+subscribe@googlegroups.com" class="underline text-emerald-400">tdsreader+subscribe@googlegroups.com</a>
            </p>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-8 py-12">
        <h3 class="text-center text-slate-500 uppercase tracking-widest text-sm font-bold mb-8">Recent Community Discussions</h3>
        <iframe
            id="forum_embed"
            src="javascript:void(0)"
            scrolling="no"
            frameborder="0"
            width="100%"
            height="500"
            class="rounded-2xl border border-slate-200 shadow-sm">
        </iframe>
        <script type="text/javascript">
            document.getElementById('forum_embed').src =
               'https://groups.google.com/g/tdsreader/forum/embed' +
               '?showsearch=true&showpopout=true&showtabs=false' +
               '&parenturl=' + encodeURIComponent(window.location.href);
        </script>
    </section>
